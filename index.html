<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lingputation Codebook Registry</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --ink: #20231f;
      --muted: #5d655d;
      --line: #cfd6cc;
      --panel: #ffffff;
      --accent: #23645a;
      --accent-2: #8b4b2f;
      --warn: #9f6a00;
      --draft: #435f9a;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .wrap {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      padding: 22px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      max-width: 820px;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
      white-space: nowrap;
    }

    main {
      padding: 18px 0 28px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 170px 180px;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
    }

    .status-line {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .registry {
      display: grid;
      gap: 10px;
    }

    .entry {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .entry-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    h2 {
      margin: 0 0 2px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 650;
      color: #fff;
      background: var(--accent);
      white-space: nowrap;
    }

    .badge.draft {
      background: var(--draft);
    }

    .badge.template {
      background: var(--warn);
    }

    .summary {
      margin: 10px 0 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .field h3 {
      margin: 0 0 5px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--accent-2);
      letter-spacing: 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 2px 0;
    }

    code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.95em;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 12px;
      background: #fafafa;
    }

    .empty,
    .error {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
    }

    .error {
      border-color: #c58a8a;
      color: #772d2d;
    }

    @media (max-width: 760px) {
      .topbar,
      .entry-head,
      .grid,
      .controls {
        grid-template-columns: 1fr;
      }

      .count {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>Lingputation Codebook Registry</h1>
        <div class="subtitle">Executable codebooks with validation records and declared projectibility profiles.</div>
      </div>
      <div class="count" id="count">Loading registry</div>
    </div>
  </header>
  <main class="wrap">
    <div class="controls">
      <input id="search" type="search" placeholder="Search codebooks, scopes, tags">
      <select id="status">
        <option value="">All statuses</option>
        <option value="draft">Draft</option>
        <option value="reviewed">Reviewed</option>
        <option value="released">Released</option>
        <option value="deprecated">Deprecated</option>
      </select>
      <select id="validation">
        <option value="">All validation states</option>
        <option value="complete">Has complete validation</option>
        <option value="template">Template only</option>
        <option value="planned">Planned validation</option>
      </select>
    </div>
    <div class="status-line" id="status-line"></div>
    <section class="registry" id="registry"></section>
  </main>

  <script>
    const state = {
      entries: [],
      query: "",
      status: "",
      validation: ""
    };

    const el = {
      count: document.getElementById("count"),
      registry: document.getElementById("registry"),
      search: document.getElementById("search"),
      status: document.getElementById("status"),
      validation: document.getElementById("validation"),
      statusLine: document.getElementById("status-line")
    };

    function textList(items) {
      if (!items || items.length === 0) return "<li>None declared</li>";
      return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function validationStates(entry) {
      return (entry.validation_records || []).map(record => record.status);
    }

    function matches(entry) {
      const haystack = [
        entry.title,
        entry.summary,
        entry.codebook_id,
        entry.codebook_version,
        ...(entry.tags || []),
        ...(entry.projectibility_profile?.supported_inferences || []),
        ...(entry.projectibility_profile?.scope_conditions || []),
        ...(entry.projectibility_profile?.failure_zones || [])
      ].join(" ").toLowerCase();

      const queryOK = !state.query || haystack.includes(state.query.toLowerCase());
      const statusOK = !state.status || entry.status === state.status;
      const validationOK = !state.validation || validationStates(entry).includes(state.validation);
      return queryOK && statusOK && validationOK;
    }

    function render() {
      const items = state.entries.filter(matches);
      el.count.textContent = `${items.length} of ${state.entries.length} codebooks`;
      el.statusLine.textContent = state.entries.length === 0 ? "" : "Registry loaded from registry.json";

      if (items.length === 0) {
        el.registry.innerHTML = '<div class="empty">No registry entries match the current filters.</div>';
        return;
      }

      el.registry.innerHTML = items.map(entry => {
        const profile = entry.projectibility_profile || {};
        const validation = validationStates(entry);
        const validationBadge = validation.includes("complete")
          ? '<span class="badge">validated</span>'
          : `<span class="badge template">${escapeHtml(validation.join(", ") || "no validation")}</span>`;
        return `
          <article class="entry">
            <div class="entry-head">
              <div>
                <h2>${escapeHtml(entry.title)}</h2>
                <div class="meta"><code>${escapeHtml(entry.codebook_id)}</code> v${escapeHtml(entry.codebook_version)} · ${escapeHtml(entry.license)}</div>
              </div>
              <div>
                <span class="badge ${escapeHtml(entry.status)}">${escapeHtml(entry.status)}</span>
                ${validationBadge}
              </div>
            </div>
            <p class="summary">${escapeHtml(entry.summary)}</p>
            <div class="grid">
              <div class="field">
                <h3>Supported Inferences</h3>
                <ul>${textList(profile.supported_inferences)}</ul>
              </div>
              <div class="field">
                <h3>Unsupported Inferences</h3>
                <ul>${textList(profile.unsupported_inferences)}</ul>
              </div>
              <div class="field">
                <h3>Scope Conditions</h3>
                <ul>${textList(profile.scope_conditions)}</ul>
              </div>
              <div class="field">
                <h3>Failure Zones</h3>
                <ul>${textList(profile.failure_zones)}</ul>
              </div>
            </div>
            <div class="tags">${(entry.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
          </article>
        `;
      }).join("");
    }

    async function loadRegistry() {
      try {
        const response = await fetch("./registry.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.entries = await response.json();
        render();
      } catch (error) {
        el.count.textContent = "Registry unavailable";
        el.registry.innerHTML = `<div class="error">Could not load <code>registry.json</code>. If opened from disk and the browser blocks local fetches, run <code>python3 -m http.server</code> in this directory.</div>`;
        el.statusLine.textContent = error.message;
      }
    }

    el.search.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    el.status.addEventListener("change", event => {
      state.status = event.target.value;
      render();
    });

    el.validation.addEventListener("change", event => {
      state.validation = event.target.value;
      render();
    });

    loadRegistry();
  </script>
</body>
</html>
